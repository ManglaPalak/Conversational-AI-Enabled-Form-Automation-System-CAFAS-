<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Intelligent Form</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
<div class="container">

  <h1>AI Intelligent Form</h1>
  <p class="subtitle">Natural Language Processing Enabled</p>

  <!-- VOICE CONTROL -->
  <div class="voice-box">
    <label>Choose Language</label>
    <select id="lang">
      <option value="en-US">English (US)</option>
      <option value="en-IN">English (India)</option>
      <option value="es-ES">Spanish (Spain)</option>
      <option value="fr-FR">French (France)</option>
      <option value="de-DE">German (Germany)</option>
      <option value="zh-CN">Chinese (China)</option>
    </select>
    <div id="waveform" class="hidden"></div>
    <div class="btns">
      <button id="startAssistant" class="start">🎤 Start Assistant</button>
      <button id="stopAssistant" class="stop">⏹ Stop Assistant</button>
      <button id="muteBtn" class="mute">🔇 Mute Voice</button>
    </div>

    <div id="micIndicator">🎤</div>
    <div id="waveform" class="hidden"></div> <!-- 🔥 Added -->
    <div id="confirmation"></div>
    <p id="statusText"></p>
  </div>

  <!-- HEARD -->
  <div class="heard">
    <b>Heard:</b> <span id="heardText">...</span>
  </div>

  <hr>

  <!-- FORM GRID -->
  <div class="form-grid">
    <!-- NAME -->
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="name">
      <small id="name_status"></small>
    </div>

    <!-- EMAIL -->
    <div class="form-group">
      <label>Email Address</label>
      <input type="text" id="email" placeholder="Say: My email is example@gmail.com">
      <small id="email_status"></small>
    </div>

    <!-- DOB -->
    <div class="form-group">
      <label>Date of Birth</label>
      <input type="date" id="dob">
      <small id="dob_status"></small>
    </div>

    <!-- GENDER -->
    <div class="form-group">
      <label>Gender</label>
      <div class="options">
        <label><input type="radio" name="gender" value="Male" id="gender_Male"> Male</label>
        <label><input type="radio" name="gender" value="Female" id="gender_Female"> Female</label>
        <label><input type="radio" name="gender" value="Other" id="gender_Other"> Other</label>
      </div>
      <small id="gender_status"></small>
    </div>
  </div>

  <!-- INTERESTS -->
  <div class="form-group">
    <label>Interests</label>
    <div class="options">
      <label><input type="checkbox" value="Music" id="interest_Music"> Music</label>
      <label><input type="checkbox" value="Sports" id="interest_Sports"> Sports</label>
      <label><input type="checkbox" value="Tech" id="interest_Tech"> Tech</label>
    </div>
    <small id="interest_status"></small>
  </div>

  <!-- RATING -->
  <div class="form-group">
    <label>Satisfaction</label>
    <div id="stars">
      <span class="star" data-value="1">★</span>
      <span class="star" data-value="2">★</span>
      <span class="star" data-value="3">★</span>
      <span class="star" data-value="4">★</span>
      <span class="star" data-value="5">★</span>
    </div>
    <input type="hidden" id="rating">
    <small id="rating_status"></small>
  </div>
  <!-- Dynamic form container -->
  <div id="userForm"></div>

  <!-- PROGRESS -->
  <div class="progress-container">
    <div class="progress-bar" id="progressBar"></div>
  </div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
